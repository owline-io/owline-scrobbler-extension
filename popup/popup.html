<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <img src="../icons/icon-48.png" class="header-logo" alt="">
    <h1>OWLINE</h1>
    <span class="dot" id="status-dot"></span>
  </div>

  <div id="login-section" class="section hidden">
    <div class="section-title">SIGN IN TO SCROBBLE</div>
    <input type="email" id="email" placeholder="EMAIL" autocomplete="email">
    <input type="password" id="password" placeholder="PASSWORD" autocomplete="current-password">
    <button class="btn" id="login-btn">[ SIGN IN ]</button>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">OR</span>
      <div class="divider-line"></div>
    </div>
    <button class="btn btn-google" id="google-btn">
      <svg width="14" height="14" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      SIGN IN WITH GOOGLE
    </button>
    <div id="login-error" class="error hidden"></div>
  </div>

  <div id="main-section" class="hidden">
    <div class="tabs">
      <button class="tab active" data-tab="status">STATUS</button>
      <button class="tab" data-tab="settings">SETTINGS</button>
      <button class="tab" data-tab="logs">LOGS</button>
    </div>

    <div id="tab-status" class="tab-panel">
      <div class="section">
        <div class="section-title">NOW PLAYING</div>
        <div id="now-playing" class="empty">NOTHING DETECTED</div>
      </div>
      <div class="section">
        <div class="section-title">SESSION</div>
        <div class="stats">
          <div class="stat-item">
            <div class="value" id="scrobble-count">0</div>
            <div class="label">SCROBBLES</div>
          </div>
          <div class="stat-item">
            <div class="value" id="queue-count">0</div>
            <div class="label">QUEUED</div>
          </div>
        </div>
      </div>
    </div>

    <div id="tab-logs" class="tab-panel hidden">
      <div class="section">
        <div class="section-title-row">
          <div class="section-title">SCROBBLE LOGS</div>
          <div class="section-actions">
            <button class="btn-ghost" id="logs-download">DOWNLOAD</button>
            <button class="btn-ghost" id="logs-clear">CLEAR</button>
          </div>
        </div>
        <div id="logs" class="logs"></div>
      </div>
    </div>

    <div id="tab-settings" class="tab-panel hidden">
      <div class="section">
        <div class="section-title">PLAYERS</div>
        <div class="providers" id="providers-players"></div>
      </div>
      <div class="section">
        <div class="section-title">TRACKERS</div>
        <div class="providers" id="providers-trackers"></div>
        <div class="destinations" id="destinations-list"></div>
      </div>
      <div class="section">
        <div class="section-title">ACCOUNT</div>
        <div class="account-user" id="username"></div>
        <button class="btn btn-danger" id="logout-btn">[ SIGN OUT ]</button>
      </div>
    </div>
  </div>

  <script src="../shared/config.js"></script>
  <script src="../shared/storage-keys.js"></script>
  <script src="../shared/api.js"></script>
  <script src="../shared/auth.js"></script>
  <script src="../shared/providers.js"></script>
  <script src="../shared/destinations.js"></script>
  <script src="../shared/migrations.js"></script>
  <script src="popup.js"></script>
</body>
</html>
